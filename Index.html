<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Destructive To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .input-container {
            display: flex;
            margin-bottom: 20px;
        }
        .task-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #45a049;
        }
        .task-list {
            list-style-type: none;
            padding: 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }
        .task-item:hover {
            background-color: #f0f0f0;
        }
        .task-checkbox {
            margin-right: 10px;
        }
        .task-text {
            flex-grow: 1;
        }
        .delete-button {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .delete-button:hover {
            background-color: #d32f2f;
        }
        .progress-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: 4px;
            margin-top: 20px;
        }
        .progress-inner {
            width: 0;
            height: 20px;
            background-color: #4CAF50;
            border-radius: 4px;
            transition: width 0.5s ease-in-out;
        }
        .timer, .focus-timer {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
        .message {
            text-align: center;
            font-style: italic;
            color: #666;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        .complete-button {
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            min-width: 120px;
        }
        .complete-button.completed {
            background-color: #4CAF50;
        }
        .complete-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
            gap: 10px;
        }

        .task-item:hover {
            background-color: #e9ecef;
            transform: translateX(5px);
        }
        .filter-buttons {
            margin: 20px 0;
        }
        .filter-button {
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-button.active {
            background-color: #007bff;
        }
        .priority-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
        .priority-high {
            background-color: #dc3545;
            color: white;
        }
        .priority-normal {
            background-color: #ffc107;
            color: black;
        }
        .priority-low {
            background-color: #28a745;
            color: white;
        }
        .priority-select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 0;
            margin: 0;
            background-color: white;
            cursor: pointer;
        }

        .priority-select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        /* Adjust input container for the new select element */
        .input-container {
            display: flex;
            margin-bottom: 20px;
            gap: 0;
        }

        .task-input {
            border-radius: 4px 0 0 4px;
        }

        .priority-select {
            border-left: none;
            border-right: none;
        }

        .button {
            border-radius: 0 4px 4px 0;
        }
        .task-content {
            display: flex;
            align-items: center;
            flex-grow: 1;
            margin-right: 10px;
        }

        .task-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }

        .priority-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .priority-high {
            background-color: #ff4444;
            color: white;
        }

        .priority-normal {
            background-color: #ffbb33;
            color: black;
        }

        .priority-low {
            background-color: #00C851;
            color: white;
        }
        .focus-mode {
            background-color: #1a1a1a !important;
            color: #fff;
            transition: all 0.5s ease;
        }

        .focus-mode .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .focus-mode .header {
            background-color: #2d2d2d;
            border-bottom: 2px solid #ff4444;
        }

        .focus-mode .task-item {
            background-color: #2d2d2d;
            border: 1px solid #404040;
            color: #fff;
        }

        .focus-mode .task-input,
        .focus-mode .priority-select {
            background-color: #2d2d2d;
            border-color: #404040;
            color: #fff;
        }

        .focus-mode .button {
            background-color: #ff4444;
            border: none;
        }

        .focus-mode .complete-button {
            background-color: #2d2d2d;
            color: #fff;
            border: 1px solid #ff4444;
        }

        .focus-mode .complete-button.completed {
            background-color: #ff4444;
            color: #fff;
        }

        .focus-mode .delete-button {
            background-color: #2d2d2d;
            border: 1px solid #ff4444;
            color: #fff;
        }

        .focus-mode-indicator {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #ff4444;
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: bold;
            animation: pulse 2s infinite;
            z-index: 1000;
        }

        .focus-mode .focus-mode-indicator {
            display: block;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .focus-mode .progress-bar {
            background-color: #2d2d2d;
        }

        .focus-mode .progress-inner {
            background-color: #ff4444;
        }

        .focus-mode .filter-button {
            background-color: #2d2d2d;
            color: #fff;
            border: 1px solid #404040;
        }

        .focus-mode .filter-button.active {
            background-color: #ff4444;
            border-color: #ff4444;
        }

        .focus-mode #focus-timer {
            color: #ff4444;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        .focus-mode #message {
            color: #ff4444;
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="focus-mode-indicator">FOCUS MODE ON</div>
    <div class="container">
        <h1>Self-Destructive To-Do List</h1>
    <div class="input-container">
        <input type="text" id="task-input" class="task-input" placeholder="Enter your task here..." />
       <select id="priority-select" class="priority-select">
            <option value="low">Low Priority</option>
           <option value="normal" selected>Normal Priority</option>
           <option value="high">High Priority</option>
        </select>
        <button class="button" id="add-task-button" onclick="addTask()">Add Task</button>
    </div>        
        <div class="filter-buttons">
            <button class="filter-button active" onclick="filterTasks('all')">All</button>
            <button class="filter-button" onclick="filterTasks('active')">Active</button>
            <button class="filter-button" onclick="filterTasks('completed')">Completed</button>
        </div>
        <button class="button" id="focus-mode-button" onclick="toggleFocusMode()">Focus Mode On</button>
        <ul class="task-list" id="task-list">
            <!-- Tasks will be displayed here -->
        </ul>
        <div class="progress-bar">
            <div class="progress-inner" id="progress-inner"></div>
        </div>
        <p class="timer" id="timer"></p>
        <p class="focus-timer" id="focus-timer"></p>
        <p class="message" id="message"></p>
        <div class="modal" id="modal">
             <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <p>Are you sure you want to delete this task?</p>
                <button class="button" id="delete-button" onclick="deleteTask()">Delete</button>
                <button class="button" id="cancel-button" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
    let tasks = [];
    let focusMode = false;
    let focusTimer;
    let focusStartTime;
    let currentFilter = 'all';
    let taskToDelete = null;

    const taskInput = document.getElementById('task-input');
    const taskList = document.getElementById('task-list');
    const progressInner = document.getElementById('progress-inner');
    const timerElement = document.getElementById('timer');
    const focusTimerElement = document.getElementById('focus-timer');
    const messageElement = document.getElementById('message');
    const modal = document.getElementById('modal');
    const focusModeButton = document.getElementById('focus-mode-button');

    function addTask() {
        const taskText = taskInput.value.trim();
        const priority = document.getElementById('priority-select').value;
        if (taskText) {
            const task = {
                id: Date.now(),
                text: taskText,
                completed: false,
                createdAt: new Date(),
                priority: priority
            };
            tasks.push(task);
            taskInput.value = '';
            renderTasks();
            updateProgress();
            saveTasks();
        }
    }

    function renderTasks() {
        taskList.innerHTML = '';
        const filteredTasks = tasks.filter(task => {
            if (currentFilter === 'all') return true;
            if (currentFilter === 'active') return !task.completed;
            if (currentFilter === 'completed') return task.completed;
        });

        filteredTasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            // Create priority label text
            const priorityLabel = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);
            
            li.innerHTML = `
                <span class="task-text">${task.text}</span>
                <span class="priority-badge priority-${task.priority}">${priorityLabel}</span>
                <div class="task-actions">
                    <button class="complete-button ${task.completed ? 'completed' : ''}" 
                            onclick="toggleComplete(${task.id})">
                        ${task.completed ? 'Completed' : 'Complete'}
                    </button>
                    <button class="delete-button" onclick="showDeleteModal(${task.id})">Delete</button>
                </div>
            `;
            taskList.appendChild(li);
        });
    }

    function toggleComplete(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            renderTasks();
            updateProgress();
            saveTasks();
        }
    }

    function showDeleteModal(id) {
        taskToDelete = id;
        modal.style.display = 'block';
    }

    function deleteTask() {
        if (taskToDelete !== null) {
            tasks = tasks.filter(task => task.id !== taskToDelete);
            renderTasks();
            updateProgress();
            saveTasks();
            closeModal();
        }
    }

    function closeModal() {
        modal.style.display = 'none';
        taskToDelete = null;
    }

    function updateProgress() {
        const totalTasks = tasks.length;
        const completedTasks = tasks.filter(task => task.completed).length;
        const progress = totalTasks === 0 ? 0 : (completedTasks / totalTasks) * 100;
        progressInner.style.width = `${progress}%`;
    }

    function toggleFocusMode() {
        focusMode = !focusMode;
        if (focusMode) {
            document.body.classList.add('focus-mode');
            focusModeButton.textContent = 'Exit Focus Mode';
            focusModeButton.style.backgroundColor = '#ff4444';
            focusStartTime = new Date();
            focusTimer = setInterval(updateFocusTimer, 1000);
            
            // Show a welcome message
            messageElement.textContent = "Focus Mode Activated - Stay Focused!";
            setTimeout(() => {
                messageElement.textContent = '';
            }, 3000);
            
            // Disable notifications if possible
            if (Notification.permission === "granted") {
                new Notification("Focus Mode Activated", {
                    body: "Stay focused on your tasks!",
                    icon: "/path/to/your/icon.png" // Add your own icon path
                });
            }
        } else {
            document.body.classList.remove('focus-mode');
            focusModeButton.textContent = 'Enter Focus Mode';
            focusModeButton.style.backgroundColor = '';
            clearInterval(focusTimer);
            focusTimerElement.textContent = '';
            messageElement.textContent = '';
        }
    }


    function updateFocusTimer() {
        const now = new Date();
        const diff = now - focusStartTime;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        focusTimerElement.textContent = `Focus Time: ${hours}h ${minutes}m ${seconds}s`;

        if (Math.random() < 0.01) {
            showDistraction();
        }
    }

    function showDistraction() {
        if (!focusMode) return;
        
        const distractions = [
            "🚫 Stay focused! Don't check your email!",
            "🚫 Social media can wait!",
            "🚫 Keep going, you're doing great!",
            "🚫 Stay on track!",
            "🚫 Maintain your focus!"
        ];
        const distraction = distractions[Math.floor(Math.random() * distractions.length)];
        messageElement.textContent = distraction;
        messageElement.style.color = '#ff4444';
        
        setTimeout(() => {
            messageElement.textContent = '';
        }, 5000);
    }
    function filterTasks(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-button').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelector(`.filter-button[onclick="filterTasks('${filter}')"]`).classList.add('active');
        renderTasks();
    }

    function saveTasks() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
        const savedTasks = localStorage.getItem('tasks');
        if (savedTasks) {
            tasks = JSON.parse(savedTasks);
            renderTasks();
            updateProgress();
        }
    }

    taskInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addTask();
        }
    });

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }

    loadTasks();
    </script>
</body>
</html>
