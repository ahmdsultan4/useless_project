<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Destructive To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .input-container {
            display: flex;
            margin-bottom: 20px;
        }
        .task-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #45a049;
        }
        .task-list {
            list-style-type: none;
            padding: 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }
        .task-item:hover {
            background-color: #f0f0f0;
        }
        .task-checkbox {
            margin-right: 10px;
        }
        .task-text {
            flex-grow: 1;
        }
        .delete-button {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .delete-button:hover {
            background-color: #d32f2f;
        }
        .progress-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: 4px;
            margin-top: 20px;
        }
        .progress-inner {
            width: 0;
            height: 20px;
            background-color: #4CAF50;
            border-radius: 4px;
            transition: width 0.5s ease-in-out;
        }
        .timer, .focus-timer {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
        .message {
            text-align: center;
            font-style: italic;
            color: #666;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
        }

        .delete-confirmation-message {
            color: #ff0000 !important;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        .complete-button {
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            min-width: 120px;
        }
        .complete-button.completed {
            background-color: #4CAF50;
        }
        .complete-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
            gap: 10px;
        }

        .task-item:hover {
            background-color: #e9ecef;
            transform: translateX(5px);
        }
        .filter-buttons {
            margin: 20px 0;
        }
        .filter-button {
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-button.active {
            background-color: #007bff;
        }
        .priority-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
        .priority-high {
            background-color: #dc3545;
            color: white;
        }
        .priority-normal {
            background-color: #ffc107;
            color: black;
        }
        .priority-low {
            background-color: #28a745;
            color: white;
        }
        .priority-select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 0;
            margin: 0;
            background-color: white;
            cursor: pointer;
        }

        .priority-select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        /* Adjust input container for the new select element */
        .input-container {
            display: flex;
            margin-bottom: 20px;
            gap: 0;
        }

        .task-input {
            border-radius: 4px 0 0 4px;
        }

        .priority-select {
            border-left: none;
            border-right: none;
        }

        .button {
            border-radius: 0 4px 4px 0;
        }
        .task-content {
            display: flex;
            align-items: center;
            flex-grow: 1;
            margin-right: 10px;
        }

        .task-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }

        .priority-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .priority-high {
            background-color: #ff4444;
            color: white;
        }

        .priority-normal {
            background-color: #ffbb33;
            color: black;
        }

        .priority-low {
            background-color: #00C851;
            color: white;
        }
        .focus-mode {
            background-color: #1a1a1a !important;
            color: #fff;
            transition: all 0.5s ease;
        }

        .focus-mode .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .focus-mode .header {
            background-color: #2d2d2d;
            border-bottom: 2px solid #ff4444;
        }

        .focus-mode .task-item {
            background-color: #2d2d2d;
            border: 1px solid #404040;
            color: #fff;
        }

        .focus-mode .task-input,
        .focus-mode .priority-select {
            background-color: #2d2d2d;
            border-color: #404040;
            color: #fff;
        }

        .focus-mode .button {
            background-color: #ff4444;
            border: none;
        }

        .focus-mode .complete-button {
            background-color: #2d2d2d;
            color: #fff;
            border: 1px solid #ff4444;
        }
        
        .focus-mode .complete-button.completed {
            background-color: #ff4444;
            color: #fff;
        }

        .focus-mode .delete-button {
            background-color: #2d2d2d;
            border: 1px solid #ff4444;
            color: #fff;
        }

        .focus-mode-indicator {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #ff4444;
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: bold;
            animation: pulse 2s infinite;
            z-index: 1000;
        }

        .focus-mode .focus-mode-indicator {
            display: block;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .focus-mode .progress-bar {
            background-color: #2d2d2d;
        }

        .focus-mode .progress-inner {
            background-color: #ff4444;
        }

        .focus-mode .filter-button {
            background-color: #2d2d2d;
            color: #fff;
            border: 1px solid #404040;
        }

        .focus-mode .filter-button.active {
            background-color: #ff4444;
            border-color: #ff4444;
        }

        .focus-mode #focus-timer {
            color: #ff4444;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        .focus-mode #message {
            color: #ff4444;
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
        }
        .taunting-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ff4444;
            color: white;
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            animation: popIn 0.5s ease-out, shake 0.5s ease-in-out 0.5s;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            max-width: 80%;
            width: 300px;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(5deg); }
            75% { transform: translate(-50%, -50%) rotate(-5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .fade-out {
            animation: fadeOut 0.5s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="focus-mode-indicator">FOCUS MODE ON</div>
    <div class="container">
        <h1>Self-Destructive To-Do List</h1>
    <div class="input-container">
        <input type="text" id="task-input" class="task-input" placeholder="Enter your task here..." />
       <select id="priority-select" class="priority-select">
            <option value="low">Low Priority</option>
           <option value="normal" selected>Normal Priority</option>
           <option value="high">High Priority</option>
        </select>
        <button class="button" id="add-task-button" onclick="addTask()">Add Task</button>
    </div>        
        <div class="filter-buttons">
            <button class="filter-button active" onclick="filterTasks('all')">All</button>
            <button class="filter-button" onclick="filterTasks('active')">Active</button>
            <button class="filter-button" onclick="filterTasks('completed')">Completed</button>
        </div>
        <button class="button" id="focus-mode-button" onclick="toggleFocusMode()">Focus Mode On</button>
        <ul class="task-list" id="task-list">
            <!-- Tasks will be displayed here -->
        </ul>
        <div class="progress-bar">
            <div class="progress-inner" id="progress-inner"></div>
        </div>
        <p class="timer" id="timer"></p>
        <p class="focus-timer" id="focus-timer"></p>
        <p class="message" id="message"></p>
        <div class="modal" id="modal">
             <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <p class="delete-confirmation-message">Are you sure you want to delete this task?</p>
                <button class="button" id="delete-button" onclick="deleteTask()">Delete</button>
                <button class="button" id="cancel-button" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
    let tasks = [];
    let focusMode = false;
    let focusTimer;
    let focusStartTime;
    let currentFilter = 'all';
    let taskToDelete = null;
    let productivityPopupInterval;

    const taskInput = document.getElementById('task-input');
    const taskList = document.getElementById('task-list');
    const progressInner = document.getElementById('progress-inner');
    const timerElement = document.getElementById('timer');
    const focusTimerElement = document.getElementById('focus-timer');
    const messageElement = document.getElementById('message');
    const modal = document.getElementById('modal');
    const focusModeButton = document.getElementById('focus-mode-button');
    // Add this at the beginning of your JavaScript section
    const absurdTasks = [
        "Research existential philosophy at 3 AM",
        "Count all the clouds in the sky",
        "Write a haiku about your to-do list",
        "Contemplate the meaning of productivity",
        "Organize your organization system",
        "Plan how to plan better",
        "Feed the dog (again)",
        "Feed the dog (one more time)",
        "Think about thinking",
        "Make a list of all your lists",
        "Reflect on your achievements... if any",
        "Schedule time to schedule things",
        "Reorganize your sock drawer by emotion",
        "Calculate the meaning of life",
        "Debug your life choices",
        "Meditate on meditation",
        "Plan your next procrastination session",
        "Question your questioning habits",
        "Optimize your optimization process",
        "Write a biography of your to-do list"
    ];
    const productivityMessages = [
        "It looks like you’re avoiding work—let me add some distractions for you.",
        "Remember, small steps lead nowhere.",
        "Glad to see you’re still with us!",
        "Isn't procrastination a lovely pastime?",
        "Why not take a break... forever?",
        "You can do it! Or not. No pressure.",
        "Just checking in—how's that task coming along?",
        "Remember, every little distraction counts!",
        "You're doing great... at avoiding your tasks!",
        "Procrastination is just productivity in disguise!"
    ];

    function showProductivityPopup() {
        if (!focusMode) return;
        
        const message = productivityMessages[Math.floor(Math.random() * productivityMessages.length)];
        
        const popup = document.createElement('div');
        popup.className = 'notification'; // Use your existing notification class
        popup.innerHTML = `
            <p>${message}</p>
            <button class="notification-button" onclick="acknowledgePopup(this)">OK</button>
        `;
        
        document.body.appendChild(popup);
    }

    function acknowledgePopup(button) {
        const popup = button.closest('.notification');
        popup.remove();
        showProductivityPopup();
    }

    function startProductivityPopups() {
        productivityPopupInterval = setInterval(() => {
            showProductivityPopup();
        }, 30000); // Show a pop-up every 30 seconds
    }

    function generateAbsurdTask(originalTask) {
        const random = Math.random();
        if (random < 0.3) {
            // 30% chance to duplicate with variation
            return `${originalTask.text} (again)`;
        } else if (random < 0.6) {
            // 30% chance to create slightly modified version
            return `${originalTask.text} but differently this time`;
        } else {
            // 40% chance to get random absurd task
            return absurdTasks[Math.floor(Math.random() * absurdTasks.length)];
        }
    }
    function startRandomDuplication() {
        setInterval(() => {
            if (focusMode && tasks.length > 0 && Math.random() < 0.1) {
                const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
                const duplicateTask = {
                    id: Date.now(),
                    text: generateAbsurdTask(randomTask),
                    completed: false,
                    createdAt: new Date(),
                    priority: ['low', 'normal', 'high'][Math.floor(Math.random() * 3)]
                };
                
                tasks.push(duplicateTask);
                renderTasks();
                updateProgress();
                saveTasks();
                
                const popup = document.createElement('div');
                popup.className = 'taunting-popup';
                popup.textContent = "Your tasks are breeding... Productivity intensifies!";
                document.body.appendChild(popup);
                
                setTimeout(() => {
                    popup.classList.add('fade-out');
                    setTimeout(() => popup.remove(), 500);
                }, 3000);
            }
        }, 30000);
    }
    function addTask() {
        const taskInput = document.getElementById('task-input');
        const prioritySelect = document.getElementById('priority-select');
        const taskText = taskInput.value.trim();
        const priority = prioritySelect.value;

        if (taskText) {
            // Add the original task
            const newTask = {
                id: Date.now(),
                text: taskText,
                completed: false,
                createdAt: new Date(),
                priority: priority
            };
            tasks.push(newTask);
            
            // Clear input right after adding
            taskInput.value = '';
            
            // Immediately render and save the original task
            renderTasks();
            updateProgress();
            saveTasks();

            // If in focus mode, add additional absurd tasks
            if (focusMode) {
                const numNewTasks = Math.floor(Math.random() * 3) + 1;
                
                for (let i = 0; i < numNewTasks; i++) {
                    setTimeout(() => {
                        const newAbsurdTask = {
                            id: Date.now() + i + 1,
                            text: generateAbsurdTask(newTask),
                            completed: false,
                            createdAt: new Date(),
                            priority: ['low', 'normal', 'high'][Math.floor(Math.random() * 3)]
                        };
                        
                        tasks.push(newAbsurdTask);
                        renderTasks();
                        updateProgress();
                        saveTasks();
                        
                        // Show a popup notification
                        const popup = document.createElement('div');
                        popup.className = 'taunting-popup';
                        popup.textContent = `Bonus task unlocked: ${newAbsurdTask.text}`;
                        document.body.appendChild(popup);
                        
                        setTimeout(() => {
                            popup.classList.add('fade-out');
                            setTimeout(() => popup.remove(), 500);
                        }, 3000);
                        
                    }, i * 1000);
                }
            }
        }
    }
    function renderTasks() {
        taskList.innerHTML = '';
        const filteredTasks = tasks.filter(task => {
            if (currentFilter === 'all') return true;
            if (currentFilter === 'active') return !task.completed;
            if (currentFilter === 'completed') return task.completed;
        });

        filteredTasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            // Create priority label text
            const priorityLabel = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);
            
            li.innerHTML = `
                <span class="task-text">${task.text}</span>
                <span class="priority-badge priority-${task.priority}">${priorityLabel}</span>
                <div class="task-actions">
                    <button class="complete-button ${task.completed ? 'completed' : ''}" 
                            onclick="toggleComplete(${task.id})">
                        ${task.completed ? 'Completed' : 'Complete'}
                    </button>
                    <button class="delete-button" onclick="showDeleteModal(${task.id})">Delete</button>
                </div>
            `;
            taskList.appendChild(li);
        });
    }

    function toggleComplete(id) {
        if (focusMode) {
            const tauntingMessages = [
                "Hmm, I don't think you're really done yet.",
                "Nice try, but you're not fooling anyone!",
                "Are you sure? That was suspiciously quick...",
                "Nope, still looks incomplete to me!",
                "You can't escape that easily!",
                "Ah ah ah, you didn't say the magic word!",
                "Sorry, the task completion fairy is on vacation.",
                "Error 404: Task completion not found.",
                "Your optimism is admirable, but let's be realistic.",
                "That's cute. Now get back to work!"
            ];

            const randomMessage = tauntingMessages[Math.floor(Math.random() * tauntingMessages.length)];

            const popup = document.createElement('div');
            popup.className = 'taunting-popup';
            popup.textContent = randomMessage;

            document.body.appendChild(popup);

            setTimeout(() => {
                popup.classList.add('fade-out');
                setTimeout(() => popup.remove(), 500);
            }, 5000);

            const taskElement = document.querySelector(`[onclick="toggleComplete(${id})"]`).closest('.task-item');
            if (taskElement) {
                taskElement.classList.add('shake');
                setTimeout(() => taskElement.classList.remove('shake'), 500);
            }

            return;
        }

        // Normal completion behavior when not in focus mode
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            renderTasks();
            updateProgress();
            saveTasks();
        }
    }
    function showDeleteModal(id) {
        taskToDelete = id;
        modal.style.display = 'block';
    }

    function deleteTask(id) {
        if (focusMode) {
            const tauntingMessages = [
                "Nice try! These tasks aren't going anywhere.",
                "Deleting won't make it disappear from your to-do list!",
                "Nope! Focus mode means facing your tasks, not erasing them.",
                "Sorry, the delete button is on vacation during focus mode.",
                "Trying to delete your responsibilities? Not today!",
                "Task deletion denied. The focus gods have spoken.",
                "Error 403: Deletion Forbidden in Focus Land.",
                "Your task is like a boomerang - it's not going away!",
                "Deleting tasks in focus mode? That's not very focused of you.",
                "Keep calm and carry on... with your tasks intact!"
            ];

            const randomMessage = tauntingMessages[Math.floor(Math.random() * tauntingMessages.length)];

            const popup = document.createElement('div');
            popup.className = 'taunting-popup';
            popup.textContent = randomMessage;

            document.body.appendChild(popup);

            setTimeout(() => {
                popup.classList.add('fade-out');
                setTimeout(() => popup.remove(), 500);
            }, 5000);

            const taskElement = document.querySelector(`[onclick="deleteTask(${id})"]`).closest('.task-item');
            if (taskElement) {
                taskElement.classList.add('shake');
                setTimeout(() => taskElement.classList.remove('shake'), 500);
            }

            return;
        }

         tasks = tasks.filter(task => task.id !== taskToDelete);
         renderTasks();
         updateProgress();
         saveTasks();
         closeModal()
        }
    function closeModal() {
        modal.style.display = 'none';
        taskToDelete = null;
    }

    function updateProgress() {
        const totalTasks = tasks.length;
        const completedTasks = tasks.filter(task => task.completed).length;
        const progress = totalTasks === 0 ? 0 : (completedTasks / totalTasks) * 100;
        progressInner.style.width = `${progress}%`;
    }


    function updateFocusTimer() {
        const now = new Date();
        const diff = now - focusStartTime;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        focusTimerElement.textContent = `Focus Time: ${hours}h ${minutes}m ${seconds}s`;

        if (Math.random() < 0.01) {
            showDistraction();
        }
    }

    function filterTasks(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-button').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelector(`.filter-button[onclick="filterTasks('${filter}')"]`).classList.add('active');
        renderTasks();
    }

    function saveTasks() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
        const savedTasks = localStorage.getItem('tasks');
        if (savedTasks) {
            tasks = JSON.parse(savedTasks);
            renderTasks();
            updateProgress();
        }
    }

    taskInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addTask();
        }
    });

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }

    loadTasks();
    let distractionInterval; // To store the interval reference



function createTaskElement(text, priority) {
    const taskItem = document.createElement('div');
    taskItem.className = 'task-item';
    taskItem.innerHTML = `
        <input type="checkbox" class="task-checkbox"focus

        <span class="task-text">${text}</span>
        <span class="priority-badge priority-${priority}">${priority}</span>
        <div class="task-actions">
            <button class="delete-button">Delete</button>
        </div>
    `;
    return taskItem;
}

function toggleFocusMode() {
    focusMode = !focusMode;
    if (focusMode) {
        document.body.classList.add('focus-mode');
        focusModeButton.textContent = 'Exit Focus Mode';
        focusModeButton.style.backgroundColor = '#64ffda';
        focusModeButton.style.color = '#0a192f';
        focusStartTime = new Date();
        focusTimer = setInterval(updateFocusTimer, 1000);
        startDistractionChecks(); // Start showing distractions
        startProductivityPopups();
        startRandomDuplication();
        // Show initial message
        messageElement.textContent = "Focus Mode Activated - Stay Focused!";
    } else {
        document.body.classList.remove('focus-mode');
        focusModeButton.textContent = 'Enter Focus Mode';
        focusModeButton.style.backgroundColor = '';
        focusModeButton.style.color = '';
        clearInterval(focusTimer);
        clearInterval(distractionInterval); // Stop distraction checks
        focusTimerElement.textContent = '';
        messageElement.textContent = '';

        clearInterval(productivityPopupInterval);
      }
    }

  
    function handleTaskActions(e) {
        const target = e.target;
        const taskItem = target.closest('.task-item');

        if (!taskItem) return;

        if (target.classList.contains('task-checkbox')) {
            setTimeout(() => {
                target.checked = false;
                showTauntingMessage(taskItem);
            }, 300);
        } else if (target.classList.contains('delete-button')) {
            taskItem.remove();
        }
    }
    document.addEventListener('DOMContentLoaded', function() {
        loadTasks();
        if (focusMode) {
            startProductivityPopups();
        }
    });
    </script>
</body>
</html>
